# Scheduler configuration
#
# Controls when the scheduler daemon fires orchestrator sessions.
# Edit times and intervals here — no code changes needed.
#
# notification channels:
#   terminal  — stdout + macOS notification banner
#   push      — Web Push to registered phone PWA
#   both      — terminal and push

quiet_hours:
  start: "22:00"
  end: "07:00"

schedules:
  morning_brief:
    enabled: true
    time: "07:30"
    days: weekdays          # weekdays | daily | weekend
    agent: coordinator
    prompt: "Good morning. What's on today?"
    notification: both

  companion_checkin:
    enabled: true
    interval_minutes: 90
    days: daily
    agent: coordinator
    prompt: "What's going on?"
    notification: push
    respect_quiet_hours: true

  evening_close:
    enabled: true
    time: "20:00"
    days: daily
    agent: coordinator
    prompt: "How did today go? Anything worth capturing before the day closes?"
    notification: push
    # Day-close = whole-person session. Coordinator routes to Diarist + Mental Wellbeing + Physical Health.

  weekly_pattern_miner:
    enabled: true
    day: sunday             # monday | tuesday | ... | sunday
    time: "09:00"
    agent: pattern_miner
    prompt: "Run a full pattern analysis for this week, the past 30 days, and the past 90 days."
    notification: terminal

  weekly_physical_review:
    enabled: true
    day: sunday
    time: "09:30"
    agent: physical_health
    prompt: "Run a weekly physical health review. Check sleep trends, exercise consistency, medication adherence, and nutrition logging for the past 7 days. Flag any trajectory concerns. Write a summary to the log."
    notification: terminal

  ambient_refresh:
    enabled: true
    interval_minutes: 180   # every 3 hours
    days: daily
    function: tools.ambient.refresh_ambient_context
    notification: false
