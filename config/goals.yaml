# Goals — Tier 3
# Sensitive-tier: local-only, 600 permissions enforced at write time.
#
# Privacy schema (enforced at the tool layer, not in prompts):
#   private_why:    The underlying motivation. SENSITIVE — never routed to a cloud LLM.
#   shareable_what: The instrumental behavior. SEMI-SENSITIVE — safe for external advice.
#
# Horizons:
#   quarterly:  90-day goals — what this season is for
#   weekly:     this week's priorities — link to quarterly via parent_goal
#   daily:      today's focus items — link to weekly via parent_goal
#
# Status values: active | paused | complete
#
# Filled during the Goals Interview. Edit directly or through the Life Manager.

quarterly: []

# Example quarterly goal (remove leading # to activate):
# quarterly:
#   - id: q1
#     title: ""
#     private_why: ""
#     shareable_what: ""
#     kpis: []
#     status: active
#     due: ""           # YYYY-MM-DD

weekly: []

# Example weekly goal:
# weekly:
#   - id: w1
#     title: ""
#     private_why: ""
#     shareable_what: ""
#     status: active
#     due: ""
#     parent_goal: q1   # id of the quarterly goal this serves

daily: []

