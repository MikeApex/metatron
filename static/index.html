<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Life Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d0d0d;
      color: #e8e8e8;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 18px 20px 12px;
      font-size: 13px;
      color: #666;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-bottom: 1px solid #1a1a1a;
    }

    #conversation {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 88%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 16px;
      line-height: 1.5;
    }

    .message.user {
      background: #1e3a5f;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      background: #1a1a1a;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message.system {
      background: transparent;
      color: #555;
      font-size: 13px;
      align-self: center;
      text-align: center;
    }

    footer {
      padding: 16px 20px;
      border-top: 1px solid #1a1a1a;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #status {
      font-size: 12px;
      color: #555;
      text-align: center;
      min-height: 16px;
    }

    #transcript {
      font-size: 14px;
      color: #aaa;
      min-height: 18px;
      text-align: center;
      font-style: italic;
    }

    #controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #mic-btn {
      flex: 1;
      height: 56px;
      border: none;
      border-radius: 28px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      background: #1e3a5f;
      color: #e8e8e8;
    }

    #mic-btn.listening {
      background: #7f1d1d;
      animation: pulse 1.2s ease-in-out infinite;
    }

    #mic-btn.loading {
      background: #333;
      cursor: not-allowed;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    #text-input {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #text-field {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 22px;
      padding: 10px 16px;
      font-size: 15px;
      color: #e8e8e8;
      outline: none;
    }

    #text-field:focus { border-color: #1e3a5f; }

    #send-btn {
      background: #1e3a5f;
      border: none;
      border-radius: 22px;
      padding: 10px 18px;
      font-size: 15px;
      color: #e8e8e8;
      cursor: pointer;
      width: 100%;
    }

    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #voice-unsupported {
      display: none;
      color: #666;
      font-size: 13px;
      text-align: center;
    }

    /* Settings bar */
    #settings {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 12px;
      color: #555;
    }

    select {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #888;
      padding: 4px 8px;
      font-size: 12px;
    }

    .miss-tap {
      display: block;
      width: 20px;
      height: 20px;
      line-height: 20px;
      text-align: center;
      font-size: 18px;
      color: #2a2a2a;
      cursor: pointer;
      margin-top: 4px;
      margin-left: 4px;
      border-radius: 50%;
      transition: color 0.2s, opacity 0.4s;
      user-select: none;
      -webkit-user-select: none;
    }

    .miss-tap:active { color: #444; }
    .miss-tap.sent { opacity: 0; pointer-events: none; }

    /* Login screen */
    #login-screen {
      position: fixed;
      inset: 0;
      background: #0d0d0d;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #login-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: min(320px, 90vw);
    }
    #login-icon { font-size: 72px; line-height: 1; }
    #login-title {
      font-size: 13px;
      color: #555;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .login-row { display: flex; flex-direction: column; gap: 6px; width: 100%; }
    .login-row label { font-size: 11px; color: #444; text-transform: uppercase; letter-spacing: 0.08em; }
    .login-row select, .login-row input[type="password"] {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      color: #e8e8e8;
      padding: 12px 14px;
      font-size: 15px;
      outline: none;
    }
    #login-enter-btn {
      width: 100%;
      height: 52px;
      background: #1e3a5f;
      border: none;
      border-radius: 26px;
      color: #e8e8e8;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }

    /* Persona chip in header */
    header { display: flex; justify-content: space-between; align-items: center; }
    #persona-chip {
      font-size: 11px;
      color: #444;
      cursor: pointer;
      padding: 3px 8px;
      border: 1px solid #222;
      border-radius: 10px;
      letter-spacing: 0.06em;
    }
    #persona-chip:active { color: #666; }
  </style>
</head>
<body>

<div id="login-screen">
  <div id="login-box">
    <div id="login-icon">𐤌</div>
    <div id="login-title">Metatron</div>
    <div class="login-row">
      <label>Persona</label>
      <select id="login-persona-select">
        <optgroup label="User">
          <option value="mike">mike</option>
        </optgroup>
        <optgroup label="Test personas">
          <option value="pepys">pepys</option>
          <option value="danny_park">danny_park</option>
          <option value="maya_torres">maya_torres</option>
          <option value="sarah_chen">sarah_chen</option>
          <option value="arthur_brooks">arthur_brooks</option>
          <option value="cal_newport">cal_newport</option>
          <option value="ryan_holiday">ryan_holiday</option>
          <option value="oliver_burkeman">oliver_burkeman</option>
          <option value="test_a3">test_a3</option>
        </optgroup>
      </select>
    </div>
    <div class="login-row">
      <label>Password</label>
      <input id="login-password" type="password" placeholder="not required">
    </div>
    <button id="login-enter-btn">Enter</button>
  </div>
</div>

<header>
  <span>Life Manager</span>
  <span id="persona-chip" style="display:none"></span>
</header>

<div id="conversation">
  <div class="message system">Session started. Tap the mic or type to begin.</div>
</div>

<footer>
  <div id="settings" style="display:none">
    <select id="provider-select"><option value="">Auto (server routing)</option></select>
    <select id="agent-select"><option value="coordinator">Coordinator</option></select>
  </div>

  <div id="status">Checking mic...</div>
  <div id="transcript"></div>

  <div id="controls">
    <button id="mic-btn">Tap to Speak</button>
  </div>
  <div id="grant-wrap" style="text-align:center;display:none">
    <button id="grant-btn" style="background:#333;border:1px solid #555;border-radius:20px;color:#aaa;font-size:13px;padding:8px 20px;cursor:pointer">Grant mic permission</button>
  </div>
  <div id="notif-wrap" style="text-align:center;margin-top:6px">
    <span id="notif-debug" style="color:#333;font-size:11px">notif-v2</span>
  </div>

  <div id="text-input">
    <input id="text-field" type="text" placeholder="Or type here..." autocomplete="off">
    <button id="send-btn">Send</button>
  </div>

  <div id="voice-unsupported">Voice not supported in this browser. Use the text input.</div>
</footer>

<script>
  // Capacitor 5+ serves bundled assets from https://localhost.
  // In the browser PWA the host is the Tailscale hostname, not localhost.
  // SERVER points to the real backend when running in the Capacitor app.
  const SERVER = window.location.hostname === 'localhost' ? 'https://metatron-vm.tail0acc5d.ts.net:8001' : '';

  // --- Persona / login ---

  let currentPersona = null;

  function enterApp(persona) {
    currentPersona = persona;
    localStorage.setItem('metatron_persona', persona);
    document.getElementById('login-screen').style.display = 'none';
    const chip = document.getElementById('persona-chip');
    chip.textContent = persona;
    chip.style.display = '';
    requestMicPermission();
    initPush();
    connectWebSocket(persona);
  }

  function showLogin() {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('persona-chip').style.display = 'none';
  }

  document.getElementById('login-enter-btn').addEventListener('click', () => {
    const persona = document.getElementById('login-persona-select').value;
    if (persona) enterApp(persona);
  });

  document.getElementById('login-password').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const persona = document.getElementById('login-persona-select').value;
      if (persona) enterApp(persona);
    }
  });

  document.getElementById('persona-chip').addEventListener('click', showLogin);

  // Auto-login if persona saved
  const savedPersona = localStorage.getItem('metatron_persona');
  if (savedPersona) {
    enterApp(savedPersona);
  }

  const conversation = document.getElementById('conversation');
  const micBtn = document.getElementById('mic-btn');
  const transcript = document.getElementById('transcript');
  const statusEl = document.getElementById('status');
  const textField = document.getElementById('text-field');
  const sendBtn = document.getElementById('send-btn');
  const providerSelect = document.getElementById('provider-select');
  const agentSelect = document.getElementById('agent-select');
  const voiceUnsupported = document.getElementById('voice-unsupported');

  function setStatus(msg, color) {
    statusEl.textContent = msg;
    statusEl.style.color = color || '#555';
  }

  // --- Conversation history display ---

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.textContent = text;
    conversation.appendChild(div);

    if (role === 'assistant') {
      const tap = document.createElement('span');
      tap.className = 'miss-tap';
      tap.textContent = '·';
      tap.title = '';
      tap.addEventListener('click', () => {
        tap.classList.add('sent');
        fetch(SERVER + '/feedback', { method: 'POST' }).catch(() => {});
      });
      conversation.appendChild(tap);
    }

    conversation.scrollTop = conversation.scrollHeight;
    return div;
  }

  // --- WebSocket (cross-device sync) ---

  let ws = null;
  let ownBubble = null;
  let ownAccumulated = '';
  const foreignBubbles = new Map();  // exchange_id → {bubble, accumulated}
  const shownIds = new Set();        // exchange_ids rendered on this device
  let lastSeenId = 0;

  function connectWebSocket(persona) {
    const base = SERVER || window.location.origin;
    const wsUrl = base.replace(/^http/, 'ws') + '/ws?persona=' + encodeURIComponent(persona);
    ws = new WebSocket(wsUrl);

    ws.onopen = () => {
      setStatus('Ready', '#555');
      if (lastSeenId > 0) {
        ws.send(JSON.stringify({ type: 'catchup', since_id: lastSeenId }));
      }
    };

    ws.onmessage = (event) => {
      handleWsMessage(JSON.parse(event.data));
    };

    ws.onclose = () => {
      // If a response was in-flight on this device, finalize what we have
      if (ownBubble) {
        ownBubble.textContent = ownAccumulated || '[Connection lost]';
        ownBubble = null; ownAccumulated = '';
        setLoading(false);
      }
      setStatus('Reconnecting...', '#888');
      setTimeout(() => { if (currentPersona) connectWebSocket(currentPersona); }, 3000);
    };
  }

  function handleWsMessage(msg) {
    switch (msg.type) {

      case 'history': {
        renderHistory(msg.messages);
        if (msg.last_id) lastSeenId = msg.last_id;
        break;
      }

      case 'stream_start': {
        // Another device started sending — render their user bubble + empty assistant bubble
        if (!shownIds.has(msg.exchange_id)) {
          addMessage('user', msg.user);
          const bubble = addMessage('assistant', '▍');
          foreignBubbles.set(msg.exchange_id, { bubble, accumulated: '' });
        }
        break;
      }

      case 'chunk': {
        if (shownIds.has(msg.exchange_id)) {
          // Own exchange: update streaming bubble
          if (ownBubble) {
            ownAccumulated += msg.text;
            ownBubble.textContent = ownAccumulated + '▍';
            conversation.scrollTop = conversation.scrollHeight;
          }
        } else {
          // Foreign exchange: update their bubble
          const fb = foreignBubbles.get(msg.exchange_id);
          if (fb) {
            fb.accumulated += msg.text;
            fb.bubble.textContent = fb.accumulated + '▍';
            conversation.scrollTop = conversation.scrollHeight;
          }
        }
        break;
      }

      case 'done': {
        if (shownIds.has(msg.exchange_id)) {
          // Own exchange complete — finalize and speak
          if (ownBubble) {
            ownBubble.textContent = ownAccumulated;
            speakResponse(ownAccumulated);
            ownBubble = null; ownAccumulated = '';
          }
          setLoading(false);
        } else {
          // Foreign exchange complete — finalize (no TTS)
          const fb = foreignBubbles.get(msg.exchange_id);
          if (fb) {
            fb.bubble.textContent = fb.accumulated;
            foreignBubbles.delete(msg.exchange_id);
          }
          shownIds.add(msg.exchange_id);
        }
        break;
      }

      case 'retract': {
        if (shownIds.has(msg.exchange_id)) {
          if (ownBubble) {
            ownBubble.textContent = "I can't help with that right now.";
            ownBubble = null; ownAccumulated = '';
          }
          setLoading(false);
        } else {
          const fb = foreignBubbles.get(msg.exchange_id);
          if (fb) { fb.bubble.textContent = '...'; foreignBubbles.delete(msg.exchange_id); }
          shownIds.add(msg.exchange_id);
        }
        break;
      }

      case 'message': {
        // Completed exchange arriving for catch-up (missed while disconnected)
        if (!shownIds.has(msg.exchange_id)) {
          addMessage('user', msg.user);
          addMessage('assistant', msg.assistant);
          shownIds.add(msg.exchange_id);
        }
        if (msg.id > lastSeenId) lastSeenId = msg.id;
        break;
      }

      case 'error': {
        if (shownIds.has(msg.exchange_id)) {
          if (ownBubble) {
            ownBubble.textContent = 'Error: ' + (msg.text || 'unknown error');
            ownBubble = null; ownAccumulated = '';
          }
          setLoading(false);
        } else {
          const fb = foreignBubbles.get(msg.exchange_id);
          if (fb) { fb.bubble.textContent = '[Error]'; foreignBubbles.delete(msg.exchange_id); }
          shownIds.add(msg.exchange_id);
        }
        break;
      }
    }
  }

  function renderHistory(messages) {
    conversation.innerHTML = '<div class="message system">Session started. Tap the mic or type to begin.</div>';
    for (const msg of messages) {
      addMessage('user', msg.user);
      addMessage('assistant', msg.assistant);
      shownIds.add(msg.exchange_id);
      if (msg.id > lastSeenId) lastSeenId = msg.id;
    }
    if (shownIds.size > 100) shownIds.clear();
  }

  // --- API call ---

  function sendToServer(input) {
    const provider = providerSelect.value;
    const agent = agentSelect.value;
    if (agent === 'coordinator') {
      sendViaWebSocket(input, provider);
    } else {
      addMessage('user', input);
      setLoading(true);
      sendBlocking(input, agent, provider);
    }
  }

  function sendViaWebSocket(input, provider) {
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      addMessage('system', 'Not connected — reconnecting...');
      return;
    }
    const exchangeId = crypto.randomUUID();
    shownIds.add(exchangeId);
    if (shownIds.size > 100) shownIds.clear();

    addMessage('user', input);
    ownBubble = addMessage('assistant', '▍');
    ownAccumulated = '';
    setLoading(true);

    ws.send(JSON.stringify({
      type: 'send',
      exchange_id: exchangeId,
      input,
      agent: 'coordinator',
      provider: provider || null,
    }));
  }

  async function sendBlocking(input, agent, provider) {
    try {
      const res = await fetch(SERVER + '/session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ input, agent, provider, persona: currentPersona }),
        signal: AbortSignal.timeout(600000),
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || 'Server error');
      }

      const data = await res.json();
      addMessage('assistant', data.response);
      speakResponse(data.response);
    } catch (e) {
      addMessage('system', `Error: ${e.message}`);
    } finally {
      setLoading(false);
    }
  }

  function setLoading(on) {
    sendBtn.disabled = on;
    if (on) {
      micBtn.classList.add('loading');
      micBtn.textContent = 'Thinking...';
      setStatus('Waiting for response...', '#888');
    } else {
      micBtn.classList.remove('loading');
      micBtn.textContent = 'Tap to Speak';
      setStatus('Ready', '#555');
    }
  }

  // --- STT via server-side Whisper (audio never leaves this device → Mac over Tailscale) ---

  let mediaRecorder = null;
  let audioChunks = [];
  let isRecording = false;
  let silenceTimer = null;
  let silencePoller = null;
  let audioCtx = null;
  let analyser = null;
  const SILENCE_MS = 2500;
  const SILENCE_RMS = 0.04;  // 0–1 normalised; tune up if triggering on background noise

  function resetMic() {
    micBtn.classList.remove('listening', 'loading');
    micBtn.disabled = false;
    micBtn.textContent = 'Tap to Speak';
    setStatus('Ready', '#555');
  }

  function stopSilenceDetection() {
    if (silencePoller) { clearInterval(silencePoller); silencePoller = null; }
    if (silenceTimer)  { clearTimeout(silenceTimer);   silenceTimer  = null; }
    if (analyser)      { analyser.disconnect();         analyser      = null; }
    if (audioCtx)      { audioCtx.close();              audioCtx      = null; }
  }

  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  }

  async function startRecording() {
    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (err) {
      setStatus('Mic blocked: ' + err.name, '#a44');
      document.getElementById('grant-wrap').style.display = 'block';
      return;
    }

    audioChunks = [];
    isRecording = true;
    micBtn.classList.add('listening');
    micBtn.textContent = 'Tap to Stop';
    setStatus('Recording...', '#4a7');
    transcript.textContent = '';

    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };

    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      stopSilenceDetection();
      isRecording = false;
      micBtn.classList.remove('listening');
      micBtn.textContent = 'Tap to Speak';

      if (audioChunks.length === 0) { setStatus('No audio captured', '#666'); return; }

      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      audioChunks = [];

      setStatus('Transcribing...', '#888');
      micBtn.classList.add('loading');
      micBtn.disabled = true;

      try {
        const fd = new FormData();
        fd.append('audio', blob, `${Date.now()}.webm`);
        const res = await fetch(SERVER + '/transcribe', { method: 'POST', body: fd });
        if (!res.ok) throw new Error((await res.json()).detail || 'Transcription failed');
        const { transcript: text } = await res.json();
        transcript.textContent = text;
        micBtn.classList.remove('loading');
        micBtn.disabled = false;
        if (text.trim()) {
          sendToServer(text.trim());
        } else {
          setStatus('No speech detected', '#666');
        }
      } catch (e) {
        setStatus('Error: ' + (e.message || 'unknown'), '#a44');
        micBtn.classList.remove('loading');
        micBtn.disabled = false;
        // leave status visible — do not reset
      }
    };

    mediaRecorder.start();

    // Silence detection: stop automatically after SILENCE_MS of quiet post-speech
    try {
      audioCtx = new AudioContext();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      audioCtx.createMediaStreamSource(stream).connect(analyser);
      const buf = new Uint8Array(analyser.frequencyBinCount);
      let speechSeen = false;

      silencePoller = setInterval(() => {
        if (!isRecording) return;
        analyser.getByteFrequencyData(buf);
        const rms = Math.sqrt(buf.reduce((s, v) => s + v * v, 0) / buf.length) / 255;
        if (rms > SILENCE_RMS) {
          speechSeen = true;
          if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; }
        } else if (speechSeen && !silenceTimer) {
          silenceTimer = setTimeout(() => { if (isRecording) stopRecording(); }, SILENCE_MS);
        }
      }, 150);
    } catch {}
  }

  // Mic permission check on load
  const grantWrap = document.getElementById('grant-wrap');
  const grantBtn  = document.getElementById('grant-btn');

  function requestMicPermission() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      setStatus('Mic unavailable (needs HTTPS)', '#a44');
      grantWrap.style.display = 'block';
      return Promise.resolve();
    }
    return navigator.mediaDevices.getUserMedia({ audio: true })
      .then(s => { s.getTracks().forEach(t => t.stop()); setStatus('Ready', '#555'); grantWrap.style.display = 'none'; })
      .catch(err => { setStatus('Mic blocked: ' + err.name, '#a44'); grantWrap.style.display = 'block'; });
  }
  grantBtn.addEventListener('click', requestMicPermission);
  requestMicPermission();

  micBtn.textContent = 'Tap to Speak';
  micBtn.addEventListener('click', () => {
    if (micBtn.disabled) return;
    if (isRecording) stopRecording(); else startRecording();
  });

  // --- TTS ---

  let audioCtxShared = null;  // single shared AudioContext — resumed on first gesture
  let currentSource = null;   // active BufferSourceNode, so we can stop on interrupt

  // Safari and Android both require a user gesture before audio can play.
  // We resume a shared AudioContext on first tap; all playback goes through it
  // so decodeAudioData/start() are always allowed after this point.
  function unlockAudio() {
    if (audioCtxShared) return;
    try {
      audioCtxShared = new (window.AudioContext || window.webkitAudioContext)();
      audioCtxShared.resume();
    } catch {}
  }
  document.addEventListener('click', unlockAudio, { once: true });
  document.addEventListener('touchend', unlockAudio, { once: true });

  async function speakResponse(text) {
    if (currentSource) { try { currentSource.stop(); } catch {} currentSource = null; }
    try {
      const res = await fetch(SERVER + '/tts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });
      if (!res.ok) throw new Error('TTS failed');
      const arrayBuffer = await res.arrayBuffer();
      if (!audioCtxShared) unlockAudio();
      await audioCtxShared.resume();
      const audioBuffer = await audioCtxShared.decodeAudioData(arrayBuffer);
      const source = audioCtxShared.createBufferSource();
      source.buffer = audioBuffer;
      source.connect(audioCtxShared.destination);
      currentSource = source;
      source.onended = () => { if (currentSource === source) currentSource = null; };
      source.start(0);
    } catch {
      const utt = new SpeechSynthesisUtterance(text);
      utt.rate = 0.95;
      window.speechSynthesis?.speak(utt);
    }
  }

  // --- Web Push registration ---

  async function subscribePush(reg) {
    const keyRes = await fetch(SERVER + '/vapid-public-key');
    const { publicKey } = await keyRes.json();
    if (!publicKey) return;
    const padding = '='.repeat((4 - publicKey.length % 4) % 4);
    const base64 = (publicKey + padding).replace(/-/g, '+').replace(/_/g, '/');
    const raw = Uint8Array.from(atob(base64), c => c.charCodeAt(0));

    // Unsubscribe any existing subscription — key may have rotated
    const existing = await reg.pushManager.getSubscription();
    if (existing) await existing.unsubscribe();

    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: raw,
    });
    await fetch(SERVER + '/subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(sub.toJSON()),
    });
    return sub;
  }

  async function initPush() {
    const wrap = document.getElementById('notif-wrap');
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
      wrap.innerHTML = '<span style="color:#333;font-size:11px">push-unsupported</span>';
      return;
    }
    const perm = Notification.permission;

    if (perm === 'denied') {
      wrap.innerHTML = '<span style="color:#333;font-size:11px">notif blocked — enable in Chrome site settings</span>';
      return;
    }

    if (perm !== 'granted') {
      // Show button immediately — don't wait for SW registration
      wrap.innerHTML = '<button id="notif-btn" style="background:#1a1a1a;border:1px solid #333;border-radius:20px;color:#666;font-size:12px;padding:6px 16px;cursor:pointer">Enable notifications</button>';
      document.getElementById('notif-btn').addEventListener('click', async () => {
        try {
          const result = await Notification.requestPermission();
          if (result === 'granted') {
            wrap.innerHTML = '<span style="color:#444;font-size:12px">Notifications on — setting up...</span>';
            const reg = await navigator.serviceWorker.register('/sw.js');
            await navigator.serviceWorker.ready;
            await subscribePush(reg);
            wrap.innerHTML = '<span style="color:#444;font-size:12px">Notifications on</span>';
          } else {
            wrap.innerHTML = '<span style="color:#333;font-size:12px">Notifications blocked</span>';
          }
        } catch(e) {
          wrap.innerHTML = `<span style="color:#333;font-size:11px">notif error: ${e.message}</span>`;
          console.warn('Push setup failed:', e);
        }
      });
      return;
    }

    // Already granted — register SW and subscribe silently
    try {
      const reg = await navigator.serviceWorker.register('/sw.js');
      await navigator.serviceWorker.ready;
      await subscribePush(reg);
      wrap.innerHTML = '<span style="color:#444;font-size:12px">Notifications on</span>';
    } catch(e) { console.warn('Push subscribe failed:', e); }
  }

  // --- Text input ---

  function submitText() {
    const text = textField.value.trim();
    if (!text) return;
    textField.value = '';
    sendToServer(text);
  }

  sendBtn.addEventListener('click', submitText);
  textField.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitText(); }
  });

  // Force clean disconnect when tab/app goes to background; onclose will reconnect on return
  document.addEventListener('visibilitychange', () => {
    if (document.hidden && ws && ws.readyState === WebSocket.OPEN) ws.close();
  });
</script>
</body>
