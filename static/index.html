<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Life Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d0d0d;
      color: #e8e8e8;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 18px 20px 12px;
      font-size: 13px;
      color: #666;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-bottom: 1px solid #1a1a1a;
    }

    #conversation {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 88%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 16px;
      line-height: 1.5;
    }

    .message.user {
      background: #1e3a5f;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      background: #1a1a1a;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message.system {
      background: transparent;
      color: #555;
      font-size: 13px;
      align-self: center;
      text-align: center;
    }

    footer {
      padding: 16px 20px;
      border-top: 1px solid #1a1a1a;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #status {
      font-size: 12px;
      color: #555;
      text-align: center;
      min-height: 16px;
    }

    #transcript {
      font-size: 14px;
      color: #aaa;
      min-height: 18px;
      text-align: center;
      font-style: italic;
    }

    #controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #mic-btn {
      flex: 1;
      height: 56px;
      border: none;
      border-radius: 28px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      background: #1e3a5f;
      color: #e8e8e8;
    }

    #mic-btn.listening {
      background: #7f1d1d;
      animation: pulse 1.2s ease-in-out infinite;
    }

    #mic-btn.loading {
      background: #333;
      cursor: not-allowed;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    #text-input {
      display: flex;
      gap: 8px;
    }

    #text-field {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 22px;
      padding: 10px 16px;
      font-size: 15px;
      color: #e8e8e8;
      outline: none;
    }

    #text-field:focus { border-color: #1e3a5f; }

    #send-btn {
      background: #1e3a5f;
      border: none;
      border-radius: 22px;
      padding: 10px 18px;
      font-size: 15px;
      color: #e8e8e8;
      cursor: pointer;
    }

    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #voice-unsupported {
      display: none;
      color: #666;
      font-size: 13px;
      text-align: center;
    }

    /* Settings bar */
    #settings {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 12px;
      color: #555;
    }

    select {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #888;
      padding: 4px 8px;
      font-size: 12px;
    }
  </style>
</head>
<body>

<header>Life Manager</header>

<div id="conversation">
  <div class="message system">Session started. Tap the mic or type to begin.</div>
</div>

<footer>
  <div id="settings">
    <span>Provider:</span>
    <select id="provider-select">
      <option value="openai">OpenAI</option>
      <option value="anthropic">Anthropic</option>
      <option value="ollama">Ollama (local)</option>
      <option value="gemini">Gemini</option>
    </select>
    <span style="margin-left:8px">Agent:</span>
    <select id="agent-select">
      <option value="time_director">Time Director</option>
      <option value="diarist">Diarist</option>
    </select>
  </div>

  <div id="status">Checking mic...</div>
  <div id="transcript"></div>

  <div id="controls">
    <button id="mic-btn">Tap to Speak</button>
  </div>
  <div id="grant-wrap" style="text-align:center;display:none">
    <button id="grant-btn" style="background:#333;border:1px solid #555;border-radius:20px;color:#aaa;font-size:13px;padding:8px 20px;cursor:pointer">Grant mic permission</button>
  </div>
  <div id="notif-wrap" style="text-align:center;margin-top:6px">
    <span id="notif-debug" style="color:#333;font-size:11px">notif-v2</span>
  </div>

  <div id="text-input">
    <input id="text-field" type="text" placeholder="Or type here..." autocomplete="off">
    <button id="send-btn">Send</button>
  </div>

  <div id="voice-unsupported">Voice not supported in this browser. Use the text input.</div>
</footer>

<script>
  const conversation = document.getElementById('conversation');
  const micBtn = document.getElementById('mic-btn');
  const transcript = document.getElementById('transcript');
  const statusEl = document.getElementById('status');
  const textField = document.getElementById('text-field');
  const sendBtn = document.getElementById('send-btn');
  const providerSelect = document.getElementById('provider-select');
  const agentSelect = document.getElementById('agent-select');
  const voiceUnsupported = document.getElementById('voice-unsupported');

  function setStatus(msg, color) {
    statusEl.textContent = msg;
    statusEl.style.color = color || '#555';
  }

  // --- Conversation history display ---

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.textContent = text;
    conversation.appendChild(div);
    conversation.scrollTop = conversation.scrollHeight;
    return div;
  }

  // --- API call ---

  async function sendToServer(input) {
    const provider = providerSelect.value;
    const agent = agentSelect.value;

    addMessage('user', input);
    setLoading(true);

    try {
      const res = await fetch('/session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ input, agent, provider }),
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || 'Server error');
      }

      const data = await res.json();
      addMessage('assistant', data.response);
      speakResponse(data.response);
    } catch (e) {
      addMessage('system', `Error: ${e.message}`);
    } finally {
      setLoading(false);
    }
  }

  function setLoading(on) {
    sendBtn.disabled = on;
    if (on) {
      micBtn.classList.add('loading');
      micBtn.textContent = 'Thinking...';
      setStatus('Waiting for response...', '#888');
    } else {
      micBtn.classList.remove('loading');
      micBtn.textContent = 'Tap to Speak';
      setStatus('Ready', '#555');
    }
  }

  // --- Web Speech API: STT ---

  let recognition = null;
  let shouldListen = false;
  let silenceTimer = null;
  let accumulated = '';
  const SILENCE_MS = 3000;

  if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.lang = 'en-US';

    recognition.onstart = () => {
      micBtn.classList.add('listening');
      micBtn.textContent = 'Tap to Stop';
      setStatus('Listening...', '#4a7');
    };

    recognition.onresult = (e) => {
      let interim = '', final = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) final += t;
        else interim += t;
      }
      if (final) accumulated += (accumulated ? ' ' : '') + final;
      transcript.textContent = accumulated + (interim ? ' ' + interim : '');
      resetSilenceTimer();
    };

    recognition.onerror = (e) => {
      if (e.error === 'no-speech') return;
      setStatus('Error: ' + e.error, '#a44');
    };

    recognition.onend = () => {
      if (shouldListen) {
        try { recognition.start(); return; } catch {}
      }
      clearSilenceTimer();
      const text = accumulated.trim();
      accumulated = '';
      resetMic();
      if (text) {
        setStatus('Sending...', '#888');
        sendToServer(text);
      } else {
        setStatus('No speech detected', '#666');
      }
    };

    micBtn.textContent = 'Tap to Speak';

    const grantWrap = document.getElementById('grant-wrap');
    const grantBtn = document.getElementById('grant-btn');

    function requestMicPermission() {
      return navigator.mediaDevices.getUserMedia({ audio: true })
        .then(stream => {
          stream.getTracks().forEach(t => t.stop());
          setStatus('Mic ready', '#4a7');
          grantWrap.style.display = 'none';
        })
        .catch(err => {
          setStatus('Mic blocked: ' + err.name, '#a44');
          grantWrap.style.display = 'block';
        });
    }

    grantBtn.addEventListener('click', requestMicPermission);
    requestMicPermission();
  } else {
    voiceUnsupported.style.display = 'block';
    micBtn.style.display = 'none';
    setStatus('Speech API not supported in this browser', '#a44');
  }

  function resetSilenceTimer() {
    clearSilenceTimer();
    silenceTimer = setTimeout(() => {
      if (shouldListen) { shouldListen = false; recognition.stop(); }
    }, SILENCE_MS);
  }

  function clearSilenceTimer() {
    if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; }
  }

  function resetMic() {
    shouldListen = false;
    micBtn.classList.remove('listening');
    micBtn.textContent = 'Tap to Speak';
    setStatus('Ready', '#555');
  }

  micBtn.addEventListener('click', () => {
    if (!recognition) return;
    if (micBtn.classList.contains('loading')) return;
    if (shouldListen) {
      shouldListen = false;
      clearSilenceTimer();
      recognition.stop();
    } else {
      accumulated = '';
      transcript.textContent = '';
      shouldListen = true;
      recognition.start();
    }
  });

  // --- Web Speech API: TTS ---

  let currentAudio = null;

  async function speakResponse(text) {
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    try {
      const res = await fetch('/tts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });
      if (!res.ok) throw new Error('TTS failed');
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      currentAudio = new Audio(url);
      currentAudio.onended = () => URL.revokeObjectURL(url);
      currentAudio.play();
    } catch {
      // fallback to browser TTS
      const utt = new SpeechSynthesisUtterance(text);
      utt.rate = 0.95;
      window.speechSynthesis?.speak(utt);
    }
  }

  // --- Web Push registration ---

  async function subscribePush(reg) {
    const keyRes = await fetch('/vapid-public-key');
    const { publicKey } = await keyRes.json();
    if (!publicKey) return;
    const padding = '='.repeat((4 - publicKey.length % 4) % 4);
    const base64 = (publicKey + padding).replace(/-/g, '+').replace(/_/g, '/');
    const raw = Uint8Array.from(atob(base64), c => c.charCodeAt(0));

    // Unsubscribe any existing subscription — key may have rotated
    const existing = await reg.pushManager.getSubscription();
    if (existing) await existing.unsubscribe();

    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: raw,
    });
    await fetch('/subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(sub.toJSON()),
    });
    return sub;
  }

  async function initPush() {
    const wrap = document.getElementById('notif-wrap');
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
      wrap.innerHTML = '<span style="color:#333;font-size:11px">push-unsupported</span>';
      return;
    }
    const perm = Notification.permission;

    if (perm === 'denied') {
      wrap.innerHTML = '<span style="color:#333;font-size:11px">notif blocked — enable in Chrome site settings</span>';
      return;
    }

    if (perm !== 'granted') {
      // Show button immediately — don't wait for SW registration
      wrap.innerHTML = '<button id="notif-btn" style="background:#1a1a1a;border:1px solid #333;border-radius:20px;color:#666;font-size:12px;padding:6px 16px;cursor:pointer">Enable notifications</button>';
      document.getElementById('notif-btn').addEventListener('click', async () => {
        try {
          const result = await Notification.requestPermission();
          if (result === 'granted') {
            wrap.innerHTML = '<span style="color:#444;font-size:12px">Notifications on — setting up...</span>';
            const reg = await navigator.serviceWorker.register('/sw.js');
            await navigator.serviceWorker.ready;
            await subscribePush(reg);
            wrap.innerHTML = '<span style="color:#444;font-size:12px">Notifications on</span>';
          } else {
            wrap.innerHTML = '<span style="color:#333;font-size:12px">Notifications blocked</span>';
          }
        } catch(e) {
          wrap.innerHTML = `<span style="color:#333;font-size:11px">notif error: ${e.message}</span>`;
          console.warn('Push setup failed:', e);
        }
      });
      return;
    }

    // Already granted — register SW and subscribe silently
    try {
      const reg = await navigator.serviceWorker.register('/sw.js');
      await navigator.serviceWorker.ready;
      await subscribePush(reg);
      wrap.innerHTML = '<span style="color:#444;font-size:12px">Notifications on</span>';
    } catch(e) { console.warn('Push subscribe failed:', e); }
  }

  initPush();

  // --- Text input ---

  function submitText() {
    const text = textField.value.trim();
    if (!text) return;
    textField.value = '';
    sendToServer(text);
  }

  sendBtn.addEventListener('click', submitText);
  textField.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitText(); }
  });
</script>
</body>
</html>
