<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Life Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d0d0d;
      color: #e8e8e8;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 18px 20px 12px;
      font-size: 13px;
      color: #666;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-bottom: 1px solid #1a1a1a;
    }

    #conversation {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 88%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 16px;
      line-height: 1.5;
    }

    .message.user {
      background: #1e3a5f;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      background: #1a1a1a;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message.system {
      background: transparent;
      color: #555;
      font-size: 13px;
      align-self: center;
      text-align: center;
    }

    footer {
      padding: 16px 20px;
      border-top: 1px solid #1a1a1a;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #transcript {
      font-size: 14px;
      color: #888;
      min-height: 18px;
      text-align: center;
    }

    #controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #mic-btn {
      flex: 1;
      height: 56px;
      border: none;
      border-radius: 28px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      background: #1e3a5f;
      color: #e8e8e8;
    }

    #mic-btn.listening {
      background: #7f1d1d;
      animation: pulse 1.2s ease-in-out infinite;
    }

    #mic-btn.loading {
      background: #333;
      cursor: not-allowed;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    #text-input {
      display: flex;
      gap: 8px;
    }

    #text-field {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 22px;
      padding: 10px 16px;
      font-size: 15px;
      color: #e8e8e8;
      outline: none;
    }

    #text-field:focus { border-color: #1e3a5f; }

    #send-btn {
      background: #1e3a5f;
      border: none;
      border-radius: 22px;
      padding: 10px 18px;
      font-size: 15px;
      color: #e8e8e8;
      cursor: pointer;
    }

    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #voice-unsupported {
      display: none;
      color: #666;
      font-size: 13px;
      text-align: center;
    }

    /* Settings bar */
    #settings {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 12px;
      color: #555;
    }

    select {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #888;
      padding: 4px 8px;
      font-size: 12px;
    }
  </style>
</head>
<body>

<header>Life Manager</header>

<div id="conversation">
  <div class="message system">Session started. Tap the mic or type to begin.</div>
</div>

<footer>
  <div id="settings">
    <span>Provider:</span>
    <select id="provider-select">
      <option value="openai">OpenAI</option>
      <option value="anthropic">Anthropic</option>
      <option value="ollama">Ollama (local)</option>
      <option value="gemini">Gemini</option>
    </select>
    <span style="margin-left:8px">Agent:</span>
    <select id="agent-select">
      <option value="time_director">Time Director</option>
      <option value="diarist">Diarist</option>
    </select>
  </div>

  <div id="transcript"></div>

  <div id="controls">
    <button id="mic-btn">Hold to Speak</button>
  </div>

  <div id="text-input">
    <input id="text-field" type="text" placeholder="Or type here..." autocomplete="off">
    <button id="send-btn">Send</button>
  </div>

  <div id="voice-unsupported">Voice not supported in this browser. Use the text input.</div>
</footer>

<script>
  const conversation = document.getElementById('conversation');
  const micBtn = document.getElementById('mic-btn');
  const transcript = document.getElementById('transcript');
  const textField = document.getElementById('text-field');
  const sendBtn = document.getElementById('send-btn');
  const providerSelect = document.getElementById('provider-select');
  const agentSelect = document.getElementById('agent-select');
  const voiceUnsupported = document.getElementById('voice-unsupported');

  // --- Conversation history display ---

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.textContent = text;
    conversation.appendChild(div);
    conversation.scrollTop = conversation.scrollHeight;
    return div;
  }

  // --- API call ---

  async function sendToServer(input) {
    const provider = providerSelect.value;
    const agent = agentSelect.value;

    addMessage('user', input);
    setLoading(true);

    try {
      const res = await fetch('/session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ input, agent, provider }),
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || 'Server error');
      }

      const data = await res.json();
      addMessage('assistant', data.response);
      speakResponse(data.response);
    } catch (e) {
      addMessage('system', `Error: ${e.message}`);
    } finally {
      setLoading(false);
    }
  }

  function setLoading(on) {
    sendBtn.disabled = on;
    if (on) {
      micBtn.classList.add('loading');
      micBtn.textContent = 'Thinking...';
    } else {
      micBtn.classList.remove('loading');
      micBtn.textContent = recognition ? 'Hold to Speak' : 'Tap to Speak';
    }
  }

  // --- Web Speech API: STT ---

  let recognition = null;
  let recognizing = false;

  if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.lang = 'en-US';

    recognition.onstart = () => {
      recognizing = true;
      micBtn.classList.add('listening');
      micBtn.textContent = 'Listening...';
      transcript.textContent = '';
    };

    recognition.onresult = (e) => {
      let interim = '', final = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        e.results[i].isFinal ? final += t : interim += t;
      }
      transcript.textContent = final || interim;
      if (final) recognition.stop();
    };

    recognition.onerror = (e) => {
      transcript.textContent = `(${e.error})`;
      resetMic();
    };

    recognition.onend = () => {
      const text = transcript.textContent.trim();
      resetMic();
      if (text) sendToServer(text);
    };

    micBtn.textContent = 'Hold to Speak';
  } else {
    voiceUnsupported.style.display = 'block';
    micBtn.style.display = 'none';
  }

  function resetMic() {
    recognizing = false;
    micBtn.classList.remove('listening');
    micBtn.textContent = recognition ? 'Hold to Speak' : 'Tap to Speak';
  }

  micBtn.addEventListener('click', () => {
    if (!recognition) return;
    if (micBtn.classList.contains('loading')) return;
    if (recognizing) {
      recognition.stop();
    } else {
      recognition.start();
    }
  });

  // --- Web Speech API: TTS ---

  function speakResponse(text) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.rate = 0.95;
    utt.pitch = 1.0;
    window.speechSynthesis.speak(utt);
  }

  // --- Text input ---

  function submitText() {
    const text = textField.value.trim();
    if (!text) return;
    textField.value = '';
    sendToServer(text);
  }

  sendBtn.addEventListener('click', submitText);
  textField.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitText(); }
  });
</script>
</body>
</html>
